# Open Transit RT — PostgreSQL tuning for VM.Standard.E2.1.Micro (1 GB RAM)
#
# Install to: /etc/postgresql/<version>/main/conf.d/open-transit-rt.conf
# Applied by: deploy/oci/setup-instance.sh
#
# Design rationale:
#   - shared_buffers at 128 MB (~12% RAM) leaves headroom for OS page cache,
#     PostGIS, 5 Go service binaries, and Caddy (~400-550 MB total).
#   - work_mem is kept at 4 MB; with max_connections=25 the worst case is
#     25 * 4 MB = 100 MB for concurrent sort/hash operations.
#   - maintenance_work_mem is 32 MB; VACUUM and index builds run infrequently.
#   - max_connections=25 supports 5 services × ~4 pool connections + headroom.
#   - random_page_cost=1.1 treats the OCI boot SSD as near-random-access.
#   - log_min_duration_statement=500 logs queries slower than 500ms for debugging.

shared_buffers              = 128MB
effective_cache_size        = 512MB
work_mem                    = 4MB
maintenance_work_mem        = 32MB
max_connections             = 25
wal_buffers                 = 4MB
checkpoint_completion_target = 0.9
random_page_cost            = 1.1
log_min_duration_statement  = 500
