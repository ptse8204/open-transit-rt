<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Open Transit RT architecture overview</title>
  <desc id="desc">GTFS import and GTFS Studio publish active GTFS versions; telemetry feeds assignments; public outputs are schedule ZIP, Vehicle Positions, Trip Updates, Alerts, and feeds.json.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5fbf"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:10}.blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#ecfdf5;stroke:#16a34a}.purple{fill:#f5f3ff;stroke:#7c3aed}.orange{fill:#fff7ed;stroke:#ea580c}.red{fill:#fef2f2;stroke:#dc2626}.gray{fill:#f1f5f9;stroke:#64748b}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a;font-size:24px;font-weight:650}.small{font-size:18px;font-weight:500}.tiny{font-size:15px;font-weight:500;fill:#334155}.line{stroke:#1f5fbf;stroke-width:3;fill:none;marker-end:url(#arrow)}.line2{stroke:#16a34a;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="60" y="64" class="text" style="font-size:34px">Open Transit RT Architecture</text>
  <text x="60" y="96" class="tiny">Phase 10 documentation view of the implemented Phase 9 backend surface</text>

  <rect x="60" y="150" width="250" height="95" class="box blue"/><text x="90" y="196" class="text">GTFS ZIP Import</text><text x="90" y="224" class="tiny">cmd/gtfs-import</text>
  <rect x="60" y="290" width="250" height="95" class="box blue"/><text x="90" y="336" class="text">GTFS Studio</text><text x="90" y="364" class="tiny">typed drafts + publish</text>
  <rect x="380" y="220" width="260" height="115" class="box blue"/><text x="415" y="265" class="text">Published GTFS</text><text x="415" y="294" class="small">active feed version</text>

  <rect x="60" y="500" width="250" height="95" class="box green"/><text x="90" y="546" class="text">Telemetry Ingest</text><text x="90" y="574" class="tiny">device Bearer tokens</text>
  <rect x="380" y="490" width="260" height="115" class="box green"/><text x="415" y="535" class="text">Matcher /</text><text x="415" y="564" class="text">Assignments</text><text x="415" y="592" class="tiny">conservative current state</text>

  <rect x="740" y="180" width="300" height="95" class="box green"/><text x="775" y="236" class="text">Vehicle Positions</text>
  <rect x="740" y="330" width="300" height="95" class="box purple"/><text x="775" y="386" class="text">Prediction Adapter</text>
  <rect x="740" y="480" width="300" height="95" class="box orange"/><text x="775" y="536" class="text">Trip Updates</text>
  <rect x="740" y="630" width="300" height="95" class="box red"/><text x="775" y="686" class="text">Service Alerts</text>

  <rect x="1110" y="150" width="360" height="540" class="box gray"/><text x="1150" y="196" class="text">Public Feeds</text>
  <rect x="1150" y="230" width="275" height="54" class="box blue"/><text x="1172" y="265" class="small">schedule.zip</text>
  <rect x="1150" y="310" width="275" height="54" class="box green"/><text x="1172" y="345" class="small">vehicle_positions.pb</text>
  <rect x="1150" y="390" width="275" height="54" class="box purple"/><text x="1172" y="425" class="small">trip_updates.pb</text>
  <rect x="1150" y="470" width="275" height="54" class="box red"/><text x="1172" y="505" class="small">alerts.pb</text>
  <rect x="1150" y="550" width="275" height="54" class="box gray"/><text x="1172" y="585" class="small">feeds.json</text>

  <rect x="380" y="720" width="660" height="100" class="box gray"/><text x="415" y="765" class="text">Validation + Scorecard</text><text x="415" y="795" class="tiny">allowlisted validator IDs, readiness, license/contact, consumer workflow records</text>

  <path class="line" d="M310 198 H380"/><path class="line" d="M310 338 H380"/><path class="line2" d="M310 548 H380"/>
  <path class="line" d="M640 260 C690 260 690 228 740 228"/><path class="line2" d="M640 548 C700 548 690 228 740 228"/>
  <path class="line" d="M640 278 C690 278 690 378 740 378"/><path class="line2" d="M640 548 C700 548 690 378 740 378"/>
  <path class="line" d="M890 275 V330"/><path class="line" d="M890 425 V480"/>
  <path class="line" d="M1040 228 H1150"/><path class="line" d="M1040 528 H1150"/><path class="line" d="M1040 678 H1150"/>
  <path class="line" d="M640 260 C880 110 1040 150 1150 257"/>
  <path class="line" d="M1040 680 C1090 680 1090 577 1150 577"/>
  <path class="line" d="M760 720 C760 650 760 650 760 575"/>
  <path class="line" d="M640 548 C700 700 700 720 760 720"/>
</svg>
