<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Open Transit RT architecture overview</title>
  <desc id="desc">Schedule inputs, vehicle state, feed builders, and public feeds are separated into clear columns, with validation and readiness evidence tracked below.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font-family:Arial,sans-serif;fill:#0f172a;font-size:52px;font-weight:800}.subtitle{font-family:Arial,sans-serif;fill:#475569;font-size:24px;font-weight:500}.group{fill:#fff;stroke:#cbd5e1;stroke-width:3;rx:28}.box{stroke-width:3;rx:20}.blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#ecfdf5;stroke:#16a34a}.purple{fill:#f5f3ff;stroke:#7c3aed}.orange{fill:#fff7ed;stroke:#ea580c}.red{fill:#fef2f2;stroke:#dc2626}.gray{fill:#f1f5f9;stroke:#475569}.head{font-family:Arial,sans-serif;fill:#0f172a;font-size:29px;font-weight:800}.label{font-family:Arial,sans-serif;fill:#0f172a;font-size:23px;font-weight:800}.small{font-family:Arial,sans-serif;fill:#475569;font-size:18px;font-weight:600}.path{font-family:Arial,sans-serif;fill:#1e293b;font-size:18px;font-weight:700}.line{stroke:#2563eb;stroke-width:5;fill:none;marker-end:url(#arrow)}.note{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="70" y="82" class="title">Open Transit RT Architecture</text>
  <text x="70" y="122" class="subtitle">Four clear areas: schedule inputs, vehicle state, feed builders, and public feeds.</text>

  <rect x="70" y="200" width="310" height="430" class="group"/>
  <text x="105" y="250" class="head">Schedule inputs</text>
  <rect x="105" y="300" width="240" height="78" class="box blue"/>
  <text x="135" y="347" class="label">GTFS ZIP import</text>
  <rect x="105" y="410" width="240" height="78" class="box blue"/>
  <text x="135" y="457" class="label">GTFS Studio</text>
  <rect x="105" y="520" width="240" height="78" class="box blue"/>
  <text x="135" y="567" class="label">Published GTFS</text>

  <rect x="465" y="200" width="310" height="430" class="group"/>
  <text x="500" y="250" class="head">Vehicle state</text>
  <rect x="500" y="315" width="240" height="84" class="box green"/>
  <text x="530" y="366" class="label">Telemetry ingest</text>
  <rect x="500" y="455" width="240" height="84" class="box green"/>
  <text x="530" y="492" class="label">Matcher and</text>
  <text x="530" y="520" class="label">assignments</text>

  <rect x="860" y="200" width="310" height="430" class="group"/>
  <text x="895" y="250" class="head">Feed builders</text>
  <rect x="895" y="285" width="240" height="64" class="box green"/>
  <text x="925" y="324" class="label">Vehicle Positions</text>
  <rect x="895" y="375" width="240" height="64" class="box purple"/>
  <text x="925" y="414" class="label">Prediction adapter</text>
  <rect x="895" y="465" width="240" height="64" class="box orange"/>
  <text x="925" y="504" class="label">Trip Updates</text>
  <rect x="895" y="555" width="240" height="64" class="box red"/>
  <text x="925" y="594" class="label">Service Alerts</text>

  <rect x="1255" y="200" width="275" height="430" class="group"/>
  <text x="1290" y="250" class="head">Public feeds</text>
  <rect x="1290" y="285" width="205" height="52" class="box blue"/>
  <text x="1315" y="318" class="path">schedule.zip</text>
  <rect x="1290" y="355" width="205" height="52" class="box gray"/>
  <text x="1315" y="388" class="path">feeds.json</text>
  <rect x="1290" y="425" width="205" height="58" class="box green"/>
  <text x="1315" y="449" class="path">Vehicle</text>
  <text x="1315" y="471" class="path">Positions</text>
  <rect x="1290" y="505" width="205" height="58" class="box purple"/>
  <text x="1315" y="529" class="path">Trip</text>
  <text x="1315" y="551" class="path">Updates</text>
  <rect x="1290" y="585" width="205" height="52" class="box red"/>
  <text x="1315" y="618" class="path">Alerts</text>

  <path class="line" d="M380 415H465"/>
  <path class="line" d="M775 415H860"/>
  <path class="line" d="M1170 415H1255"/>

  <rect x="250" y="710" width="1100" height="94" class="note"/>
  <text x="295" y="752" class="label" style="font-size:22px">Validation, metadata, and readiness evidence</text>
  <text x="295" y="782" class="small">Validator results, license/contact metadata, scorecards, and consumer-ingestion records support readiness review.</text>
</svg>
