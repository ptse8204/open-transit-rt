<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Small agency deployment shape</title>
  <desc id="desc">A TLS reverse proxy sends anonymous public feed traffic and protected admin traffic to Open Transit RT services backed by Postgres/PostGIS, validators, and an optional predictor adapter.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font-family:Arial,sans-serif;fill:#0f172a;font-size:52px;font-weight:800}.subtitle{font-family:Arial,sans-serif;fill:#475569;font-size:24px;font-weight:500}.box{stroke-width:3;rx:24}.internet{fill:#fff;stroke:#334155}.proxy{fill:#eff6ff;stroke:#2563eb}.public{fill:#ecfdf5;stroke:#16a34a}.admin{fill:#f5f3ff;stroke:#7c3aed}.svc{fill:#fff;stroke:#2563eb}.db{fill:#f1f5f9;stroke:#475569}.tool{fill:#fff7ed;stroke:#ea580c}.text{font-family:Arial,sans-serif;fill:#0f172a;font-size:28px;font-weight:800}.small{font-family:Arial,sans-serif;fill:#475569;font-size:20px;font-weight:600}.path{font-family:Arial,sans-serif;fill:#1e293b;font-size:18px;font-weight:700}.line{stroke:#2563eb;stroke-width:5;fill:none;marker-end:url(#arrow)}.green{stroke:#16a34a}.purple{stroke:#7c3aed}.orange{stroke:#ea580c}.note{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="70" y="82" class="title">Small Agency Deployment Shape</text>
  <text x="70" y="122" class="subtitle">A TLS proxy exposes public feeds and keeps operations routes protected.</text>

  <rect x="570" y="160" width="460" height="72" class="box internet"/>
  <text x="698" y="206" class="text">Public Internet</text>

  <rect x="500" y="290" width="600" height="84" class="box proxy"/>
  <text x="672" y="342" class="text">TLS Reverse Proxy</text>
  <path class="line" d="M800 232V290"/>

  <rect x="115" y="455" width="430" height="160" class="box public"/>
  <text x="155" y="505" class="text">Anonymous public feeds</text>
  <text x="155" y="545" class="path">schedule.zip, feeds.json</text>
  <text x="155" y="575" class="path">vehicle_positions.pb</text>
  <text x="155" y="605" class="path">trip_updates.pb, alerts.pb</text>

  <rect x="1055" y="455" width="430" height="160" class="box admin"/>
  <text x="1095" y="505" class="text">Protected admin tools</text>
  <text x="1095" y="545" class="path">GTFS Studio, JSON debug</text>
  <text x="1095" y="575" class="path">validation, scorecard, metrics</text>
  <text x="1095" y="605" class="path">Bearer JWT or admin cookie</text>

  <path class="line green" d="M610 374C500 420 410 440 330 455"/>
  <path class="line purple" d="M990 374C1100 420 1190 440 1270 455"/>

  <rect x="425" y="670" width="750" height="108" class="box svc"/>
  <text x="465" y="720" class="text">Open Transit RT services</text>
  <text x="465" y="752" class="small">agency-config, telemetry-ingest, feed publishers, GTFS Studio</text>

  <path class="line" d="M330 615C430 650 520 665 600 670"/>
  <path class="line" d="M1270 615C1170 650 1080 665 1000 670"/>

  <rect x="140" y="700" width="245" height="76" class="box tool"/>
  <text x="177" y="747" class="text" style="font-size:23px">Pinned validators</text>

  <rect x="435" y="810" width="330" height="64" class="box admin"/>
  <text x="475" y="850" class="text" style="font-size:22px">Prediction adapter</text>

  <rect x="825" y="810" width="330" height="64" class="box db"/>
  <text x="865" y="850" class="text" style="font-size:22px">Postgres / PostGIS</text>

  <rect x="1210" y="700" width="270" height="76" class="note"/>
  <text x="1240" y="733" class="small">Production packaging</text>
  <text x="1240" y="760" class="small">is deployment-owned.</text>

  <path class="line orange" d="M385 738H425"/>
  <path class="line" d="M990 810V778"/>
</svg>
