<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Where to start in the docs</title>
  <desc id="desc">Illustrative documentation guide with five large cards for trying locally, running the agency demo, planning deployment, reviewing evidence, and contributing.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg{fill:#f8fafc}.title{font-family:Arial,sans-serif;fill:#0f172a;font-size:58px;font-weight:800}.subtitle{font-family:Arial,sans-serif;fill:#475569;font-size:25px;font-weight:500}.card{stroke-width:3;rx:26;filter:url(#shadow)}.blue{fill:#eff6ff;stroke:#2563eb}.green{fill:#ecfdf5;stroke:#16a34a}.purple{fill:#f5f3ff;stroke:#7c3aed}.amber{fill:#fffbeb;stroke:#f59e0b}.cyan{fill:#ecfeff;stroke:#0891b2}.orange{fill:#fff7ed;stroke:#ea580c}.label{font-family:Arial,sans-serif;fill:#0f172a;font-size:38px;font-weight:800}.small{font-family:Arial,sans-serif;fill:#475569;font-size:24px;font-weight:600}.icon{stroke:#0f172a;stroke-width:9;fill:none;stroke-linecap:round;stroke-linejoin:round}.soft{fill:#dbeafe}.softgreen{fill:#bbf7d0}.softpurple{fill:#ddd6fe}.softamber{fill:#fde68a}.softcyan{fill:#cffafe}.softorange{fill:#fed7aa}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="80" y="92" class="title">Where to start</text>
  <text x="80" y="136" class="subtitle">Choose the documentation path that matches what you want to do.</text>

  <g transform="translate(80 205)">
    <rect class="card blue" width="430" height="230" rx="26"/>
    <circle cx="96" cy="86" r="48" class="soft" stroke="#2563eb" stroke-width="4"/>
    <path class="icon" d="M72 86h48M96 62v48" stroke="#2563eb"/>
    <text x="175" y="92" class="label">Try locally</text>
    <text x="175" y="134" class="small">Local Quickstart</text>
  </g>

  <g transform="translate(585 205)">
    <rect class="card purple" width="430" height="230" rx="26"/>
    <circle cx="96" cy="86" r="48" class="softpurple" stroke="#7c3aed" stroke-width="4"/>
    <rect x="62" y="58" width="68" height="55" rx="10" fill="none" stroke="#7c3aed" stroke-width="8"/>
    <circle cx="79" cy="125" r="8" fill="#7c3aed"/>
    <circle cx="113" cy="125" r="8" fill="#7c3aed"/>
    <text x="175" y="92" class="label">Agency demo</text>
    <text x="175" y="134" class="small">Executable flow</text>
  </g>

  <g transform="translate(1090 205)">
    <rect class="card amber" width="430" height="230" rx="26"/>
    <circle cx="96" cy="86" r="48" class="softamber" stroke="#f59e0b" stroke-width="4"/>
    <path class="icon" d="M62 112h68M72 112V72h48v40M83 72V54h26v18" stroke="#d97706"/>
    <text x="175" y="92" class="label">Deploy</text>
    <text x="175" y="134" class="small">Deployment guides</text>
  </g>

  <g transform="translate(330 505)">
    <rect class="card cyan" width="430" height="230" rx="26"/>
    <circle cx="96" cy="86" r="48" class="softcyan" stroke="#0891b2" stroke-width="4"/>
    <path class="icon" d="M70 94l20 20 52-58M145 118H90" stroke="#0891b2"/>
    <text x="175" y="92" class="label">Evidence</text>
    <text x="175" y="134" class="small">Readiness boundaries</text>
  </g>

  <g transform="translate(840 505)">
    <rect class="card orange" width="430" height="230" rx="26"/>
    <circle cx="96" cy="86" r="48" class="softorange" stroke="#ea580c" stroke-width="4"/>
    <path class="icon" d="M96 57v58M67 86h58M70 128h52" stroke="#ea580c"/>
    <text x="175" y="92" class="label">Contribute</text>
    <text x="175" y="134" class="small">Status and handoffs</text>
  </g>
</svg>
