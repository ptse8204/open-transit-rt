<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Choose your path through the documentation</title>
  <desc id="desc">Illustrative documentation guide with paths for trying locally, running the agency demo, planning deployment, reviewing evidence, and contributing.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.center{fill:#0f172a;stroke:#0f172a;stroke-width:3;rx:20}.path{fill:#fff;stroke:#2563eb;stroke-width:3;rx:18}.evidence{fill:#ecfdf5;stroke:#16a34a;stroke-width:3;rx:18}.deploy{fill:#fff7ed;stroke:#f97316;stroke-width:3;rx:18}.contrib{fill:#f1f5f9;stroke:#475569;stroke-width:3;rx:18}.line{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a;font-size:30px;font-weight:750}.small{font-size:22px;font-weight:600}.tiny{font-size:18px;font-weight:500;fill:#475569}.white{fill:#fff}.mono{font-family:"SFMono-Regular",Consolas,monospace;font-size:18px;font-weight:650;fill:#1e293b}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="64" y="74" class="text" style="font-size:42px">Choose your path</text>
  <text x="64" y="112" class="tiny">Illustrative guide for readers who want the fastest useful starting point in the docs.</text>

  <rect x="650" y="350" width="300" height="150" class="center"/>
  <text x="715" y="415" class="text white">Start here</text>
  <text x="704" y="455" class="tiny white">Pick the path that</text>
  <text x="704" y="482" class="tiny white">matches your job.</text>

  <rect x="110" y="190" width="310" height="135" class="path"/>
  <text x="145" y="245" class="small">Try locally</text>
  <text x="145" y="282" class="mono">local-quickstart.md</text>

  <rect x="110" y="565" width="310" height="135" class="path"/>
  <text x="145" y="620" class="small">Run agency demo</text>
  <text x="145" y="657" class="mono">agency-demo-flow.md</text>

  <rect x="645" y="665" width="310" height="135" class="deploy"/>
  <text x="680" y="720" class="small">Plan deployment</text>
  <text x="680" y="757" class="mono">production checklist</text>

  <rect x="1180" y="190" width="310" height="135" class="evidence"/>
  <text x="1215" y="245" class="small">Review evidence</text>
  <text x="1215" y="282" class="mono">compliance checklist</text>

  <rect x="1180" y="565" width="310" height="135" class="contrib"/>
  <text x="1215" y="620" class="small">Contribute</text>
  <text x="1215" y="657" class="mono">status, handoffs, issues</text>

  <path class="line" d="M650 390C530 330 480 280 420 258"/>
  <path class="line" d="M650 460C530 530 470 595 420 632"/>
  <path class="line" d="M800 500V665"/>
  <path class="line" d="M950 390C1070 330 1120 280 1180 258"/>
  <path class="line" d="M950 460C1070 530 1130 595 1180 632"/>
</svg>
