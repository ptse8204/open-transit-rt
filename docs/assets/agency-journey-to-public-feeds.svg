<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Small agency journey to public transit feeds</title>
  <desc id="desc">Illustrative flow showing a small agency moving from GTFS import or GTFS Studio drafts through schedule publication, vehicle telemetry, validation, and public GTFS plus GTFS Realtime feeds.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.step{fill:#eff6ff;stroke:#2563eb;stroke-width:3;rx:16}.ok{fill:#ecfdf5;stroke:#16a34a;stroke-width:3;rx:16}.warn{fill:#fff7ed;stroke:#f97316;stroke-width:3;rx:16}.public{fill:#f1f5f9;stroke:#475569;stroke-width:3;rx:16}.line{stroke:#2563eb;stroke-width:4;fill:none;marker-end:url(#arrow)}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a;font-size:30px;font-weight:750}.small{font-size:22px;font-weight:600}.tiny{font-size:18px;font-weight:500;fill:#475569}.mono{font-family:"SFMono-Regular",Consolas,monospace;font-size:20px;font-weight:650;fill:#1e293b}.icon{font-size:42px;font-weight:800;fill:#2563eb}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="64" y="72" class="text" style="font-size:42px">Agency journey to public feeds</text>
  <text x="64" y="112" class="tiny">Illustrative teaching graphic. It shows the repo-supported path without claiming hosted SaaS, CAD/AVL replacement, consumer acceptance, or full compliance.</text>

  <rect x="60" y="185" width="255" height="210" class="step"/>
  <text x="92" y="242" class="icon">1</text>
  <text x="92" y="286" class="small">Import or</text>
  <text x="92" y="318" class="small">author GTFS</text>
  <text x="92" y="354" class="tiny">ZIP import or GTFS Studio</text>
  <text x="92" y="382" class="mono">routes, stops, trips</text>

  <rect x="390" y="185" width="255" height="210" class="ok"/>
  <text x="422" y="242" class="icon" style="fill:#16a34a">2</text>
  <text x="422" y="292" class="small">Publish schedule.zip</text>
  <text x="422" y="330" class="tiny">Active published GTFS version</text>
  <text x="422" y="362" class="mono">/public/gtfs/</text>

  <rect x="720" y="185" width="255" height="210" class="step"/>
  <text x="752" y="242" class="icon">3</text>
  <text x="752" y="286" class="small">Ingest vehicle</text>
  <text x="752" y="318" class="small">telemetry</text>
  <text x="752" y="354" class="tiny">Authenticated device tokens</text>
  <text x="752" y="382" class="mono">latest vehicle state</text>

  <rect x="1050" y="185" width="255" height="210" class="warn"/>
  <text x="1082" y="242" class="icon" style="fill:#f97316">4</text>
  <text x="1082" y="292" class="small">Validate feeds</text>
  <text x="1082" y="330" class="tiny">Pinned validator workflow</text>
  <text x="1082" y="362" class="mono">scorecard evidence</text>

  <rect x="545" y="530" width="510" height="210" class="public"/>
  <text x="590" y="590" class="text">Public GTFS + GTFS Realtime</text>
  <text x="590" y="635" class="mono">schedule.zip</text>
  <text x="590" y="670" class="mono">feeds.json</text>
  <text x="835" y="635" class="mono">vehicle_positions.pb</text>
  <text x="835" y="670" class="mono">trip_updates.pb</text>
  <text x="835" y="705" class="mono">alerts.pb</text>

  <path class="line" d="M315 290H390"/>
  <path class="line" d="M645 290H720"/>
  <path class="line" d="M975 290H1050"/>
  <path class="line" d="M1178 395C1150 510 1070 565 1055 610"/>
  <path class="line" d="M847 395V530"/>
  <path class="line" d="M518 395C545 505 565 545 590 570"/>

  <rect x="70" y="620" width="370" height="120" class="panel"/>
  <text x="98" y="660" class="small">Operator boundary</text>
  <text x="98" y="696" class="tiny">Admin and JSON debug surfaces</text>
  <text x="98" y="724" class="tiny">remain protected.</text>

  <rect x="1160" y="620" width="380" height="120" class="panel"/>
  <text x="1218" y="660" class="small">Evidence boundary</text>
  <text x="1218" y="696" class="tiny">Validation and hosting evidence</text>
  <text x="1218" y="724" class="tiny">do not prove consumer acceptance.</text>
</svg>
