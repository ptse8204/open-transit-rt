<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Local quickstart flow</title>
  <desc id="desc">The local demo sets up the database and validators, imports GTFS, starts services, ingests telemetry, fetches public feeds, validates, and checks the scorecard.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font-family:Arial,sans-serif;fill:#0f172a;font-size:52px;font-weight:800}.subtitle{font-family:Arial,sans-serif;fill:#475569;font-size:24px;font-weight:500}.phase{font-family:Arial,sans-serif;fill:#2563eb;font-size:24px;font-weight:800}.card{fill:#fff;stroke:#2563eb;stroke-width:3;rx:22}.card2{fill:#ecfdf5;stroke:#16a34a;stroke-width:3;rx:22}.card3{fill:#f1f5f9;stroke:#475569;stroke-width:3;rx:22}.num{font-family:Arial,sans-serif;fill:#2563eb;font-size:34px;font-weight:800}.label{font-family:Arial,sans-serif;fill:#0f172a;font-size:24px;font-weight:800}.small{font-family:Arial,sans-serif;fill:#475569;font-size:17px;font-weight:600}.note{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}
    </style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="70" y="82" class="title">Local Quickstart Flow</text>
  <text x="70" y="122" class="subtitle">One command runs the agency demo. These are the major steps it verifies.</text>

  <text x="95" y="190" class="phase">Set up</text>
  <text x="590" y="190" class="phase">Publish and ingest</text>
  <text x="1085" y="190" class="phase">Review outputs</text>

  <rect x="70" y="225" width="430" height="110" class="card"/>
  <text x="105" y="273" class="num">1</text>
  <text x="160" y="273" class="label">Bootstrap database</text>
  <text x="160" y="305" class="small">Postgres/PostGIS, migrations, seed data</text>

  <rect x="70" y="365" width="430" height="110" class="card"/>
  <text x="105" y="413" class="num">2</text>
  <text x="160" y="413" class="label">Install validators</text>
  <text x="160" y="445" class="small">Pinned static GTFS and GTFS-RT checks</text>

  <rect x="70" y="505" width="430" height="110" class="card"/>
  <text x="105" y="553" class="num">3</text>
  <text x="160" y="553" class="label">Import sample GTFS</text>
  <text x="160" y="585" class="small">Loads the committed small test feed</text>

  <rect x="565" y="225" width="430" height="110" class="card2"/>
  <text x="600" y="273" class="num" fill="#16a34a">4</text>
  <text x="655" y="273" class="label">Start services</text>
  <text x="655" y="305" class="small">Agency config, telemetry, feeds, Studio</text>

  <rect x="565" y="365" width="430" height="110" class="card2"/>
  <text x="600" y="413" class="num" fill="#16a34a">5</text>
  <text x="655" y="413" class="label">Publish metadata</text>
  <text x="655" y="445" class="small">Creates local feeds.json details</text>

  <rect x="565" y="505" width="430" height="110" class="card2"/>
  <text x="600" y="553" class="num" fill="#16a34a">6</text>
  <text x="655" y="553" class="label">Ingest telemetry</text>
  <text x="655" y="585" class="small">Uses the seeded device token</text>

  <rect x="1060" y="225" width="430" height="110" class="card3"/>
  <text x="1095" y="273" class="num" fill="#475569">7</text>
  <text x="1150" y="273" class="label">Fetch public feeds</text>
  <text x="1150" y="305" class="small">schedule.zip, feeds.json, realtime feeds</text>

  <rect x="1060" y="365" width="430" height="110" class="card3"/>
  <text x="1095" y="413" class="num" fill="#475569">8</text>
  <text x="1150" y="413" class="label">Run validation</text>
  <text x="1150" y="445" class="small">Checks schedule and realtime feeds</text>

  <rect x="1060" y="505" width="430" height="110" class="card3"/>
  <text x="1095" y="553" class="num" fill="#475569">9</text>
  <text x="1150" y="553" class="label">Check readiness records</text>
  <text x="1150" y="585" class="small">Scorecard and ingestion records</text>

  <rect x="260" y="690" width="1080" height="92" class="note"/>
  <text x="305" y="735" class="label" style="font-size:22px">Demo boundary</text>
  <text x="305" y="765" class="small">The local demo proves the flow runs on one machine. Hosted readiness and consumer acceptance require separate evidence.</text>
</svg>
