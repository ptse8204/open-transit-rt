<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Local quickstart flow</title>
  <desc id="desc">The local demo bootstraps the DB, installs validators, imports GTFS, starts services, bootstraps publication, ingests telemetry, fetches public feeds, runs validation, and inspects scorecards.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2563eb"/></marker>
    <style>.bg{fill:#f8fafc}.step{fill:#fff;stroke:#2563eb;stroke-width:2;rx:10}.note{fill:#ecfdf5;stroke:#16a34a;stroke-width:2;rx:10}.feeds{fill:#f1f5f9;stroke:#64748b;stroke-width:2;rx:10}.text{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;fill:#0f172a;font-size:23px;font-weight:650}.small{font-size:17px;font-weight:500}.tiny{font-size:14px;font-weight:500;fill:#334155}.num{font-size:24px;font-weight:800;fill:#2563eb}.line{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}</style>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text x="60" y="64" class="text" style="font-size:34px">Executable Local Demo Flow</text>
  <text x="60" y="96" class="tiny">Implemented by make demo-agency-flow and scripts/demo-agency-flow.sh</text>
  <g>
    <rect x="55" y="160" width="150" height="100" class="step"/><text x="78" y="196" class="num">1</text><text x="78" y="230" class="small">Bootstrap DB</text>
    <rect x="230" y="160" width="170" height="100" class="step"/><text x="253" y="196" class="num">2</text><text x="253" y="230" class="small">Install Validators</text>
    <rect x="425" y="160" width="185" height="100" class="step"/><text x="448" y="196" class="num">3</text><text x="448" y="230" class="small">Import GTFS</text>
    <rect x="635" y="160" width="170" height="100" class="step"/><text x="658" y="196" class="num">4</text><text x="658" y="230" class="small">Start Services</text>
    <rect x="830" y="160" width="220" height="100" class="step"/><text x="853" y="196" class="num">5</text><text x="853" y="230" class="small">Bootstrap Publication</text>
    <rect x="1075" y="160" width="185" height="100" class="step"/><text x="1098" y="196" class="num">6</text><text x="1098" y="230" class="small">Ingest Telemetry</text>
    <rect x="1285" y="160" width="235" height="100" class="step"/><text x="1308" y="196" class="num">7</text><text x="1308" y="230" class="small">Fetch Public Feeds</text>
    <path class="line" d="M205 210H230"/><path class="line" d="M400 210H425"/><path class="line" d="M610 210H635"/><path class="line" d="M805 210H830"/><path class="line" d="M1050 210H1075"/><path class="line" d="M1260 210H1285"/>
  </g>
  <rect x="865" y="310" width="255" height="70" class="note"/><text x="890" y="354" class="small">Admin token: Bearer JWT</text>
  <rect x="1060" y="310" width="270" height="70" class="note"/><text x="1085" y="354" class="small">Device token: dev-device-token</text>
  <rect x="1230" y="430" width="300" height="205" class="feeds"/><text x="1260" y="470" class="text">Public artifacts</text><text x="1260" y="510" class="small">schedule.zip</text><text x="1260" y="540" class="small">feeds.json</text><text x="1260" y="570" class="small">vehicle_positions.pb</text><text x="1260" y="600" class="small">trip_updates.pb</text><text x="1260" y="630" class="small">alerts.pb</text>
  <rect x="720" y="610" width="245" height="100" class="step"/><text x="745" y="647" class="num">8</text><text x="745" y="682" class="small">Run Validation</text>
  <rect x="420" y="610" width="260" height="100" class="step"/><text x="445" y="647" class="num">9</text><text x="445" y="682" class="small">Inspect Scorecard</text>
  <rect x="180" y="430" width="360" height="120" class="feeds"/><text x="210" y="475" class="text">Protected checks</text><text x="210" y="510" class="small">GTFS Studio and JSON debug require auth</text>
  <path class="line" d="M1402 260V430"/><path class="line" d="M1230 535C1090 560 1020 610 965 660"/><path class="line" d="M720 660H680"/><path class="line" d="M830 610C740 510 540 500 540 500"/>
</svg>
