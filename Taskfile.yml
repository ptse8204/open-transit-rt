version: '3'

vars:
  DATABASE_URL: '{{.DATABASE_URL | default "postgres://postgres:postgres@localhost:55432/open_transit_rt?sslmode=disable"}}'
  TEST_DATABASE_URL: '{{.TEST_DATABASE_URL | default "postgres://postgres:postgres@localhost:55432/open_transit_rt_test?sslmode=disable"}}'
  MIGRATIONS_DIR: '{{.MIGRATIONS_DIR | default "db/migrations"}}'

tasks:
  deps:
    cmds:
      - go mod download

  db:up:
    cmds:
      - docker compose -f deploy/docker-compose.yml up -d postgres

  db:down:
    cmds:
      - docker compose -f deploy/docker-compose.yml down

  migrate:up:
    cmds:
      - DATABASE_URL="{{.DATABASE_URL}}" MIGRATIONS_DIR="{{.MIGRATIONS_DIR}}" go run ./cmd/migrate up

  migrate:down:
    cmds:
      - DATABASE_URL="{{.DATABASE_URL}}" MIGRATIONS_DIR="{{.MIGRATIONS_DIR}}" go run ./cmd/migrate down

  migrate:status:
    cmds:
      - DATABASE_URL="{{.DATABASE_URL}}" MIGRATIONS_DIR="{{.MIGRATIONS_DIR}}" go run ./cmd/migrate status

  migrate:redo:
    cmds:
      - DATABASE_URL="{{.DATABASE_URL}}" MIGRATIONS_DIR="{{.MIGRATIONS_DIR}}" go run ./cmd/migrate redo

  seed:
    cmds:
      - echo "Phase 0 has deterministic fixtures under testdata/. Runtime seeding is implemented in a later phase."

  dev:
    cmds:
      - ./scripts/bootstrap-dev.sh

  build:
    cmds:
      - go build ./...

  test:
    cmds:
      - go test ./...

  test:integration:
    cmds:
      - DATABASE_URL="{{.DATABASE_URL}}" MIGRATIONS_DIR="{{.MIGRATIONS_DIR}}" go run ./cmd/migrate status
      - echo "Phase 0 integration smoke: database is reachable and migrations are visible. No DB-backed integration test files exist yet."
      - INTEGRATION_TESTS=1 TEST_DATABASE_URL="{{.TEST_DATABASE_URL}}" go test ./...

  fmt:
    cmds:
      - gofmt -w ./cmd ./internal

  lint:
    cmds:
      - |
        if command -v golangci-lint >/dev/null 2>&1; then
          golangci-lint run ./...
        else
          echo "optional lint skipped: golangci-lint is not installed; future CI should make this required once configured"
        fi

  validate:
    cmds:
      - echo "Phase 0 validation smoke: checking scaffold files only; canonical GTFS and GTFS-RT validators are documented but not wired yet."
      - test -f db/migrations/000001_initial_schema.sql
      - test -d testdata/gtfs/valid-small
      - test -d testdata/gtfs/after-midnight
      - test -d testdata/gtfs/frequency-based
      - test -d testdata/gtfs/malformed
      - echo "Validation smoke passed. Future phases must wire canonical validators before any compliance claim."
